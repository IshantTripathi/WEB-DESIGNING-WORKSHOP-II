<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Management System</title>
</head>

<body style="font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;padding:40px;border-radius:10px;width:420px;text-align:center;box-shadow:0px 0px 10px gray;">

<h2>Employee Salary Management System</h2>

<input id="name" placeholder="Employee Name" style="width:90%;padding:8px;margin:5px;"><br>

<input id="id" placeholder="Employee ID" style="width:90%;padding:8px;margin:5px;"><br>

<input id="salary" placeholder="Salary" style="width:90%;padding:8px;margin:5px;"><br>

<input id="dept" placeholder="Department" style="width:90%;padding:8px;margin:5px;"><br>

<button onclick="addEmployee()" style="background:#4CAF50;color:white;border:none;padding:10px;margin:10px;border-radius:5px;">
Add Employee
</button>

<br>

<button onclick="displayAll()" style="background:#4CAF50;color:white;border:none;padding:8px;margin:5px;border-radius:5px;">
Display All
</button>

<button onclick="salaryFilter()" style="background:#4CAF50;color:white;border:none;padding:8px;margin:5px;border-radius:5px;">
Salary > 50000
</button>

<button onclick="totalSalary()" style="background:#4CAF50;color:white;border:none;padding:8px;margin:5px;border-radius:5px;">
Total Salary
</button>

<button onclick="averageSalary()" style="background:#4CAF50;color:white;border:none;padding:8px;margin:5px;border-radius:5px;">
Average Salary
</button>

<br>

<button onclick="countDept()" style="background:#4CAF50;color:white;border:none;padding:8px;margin:5px;border-radius:5px;">
Count by Department
</button>

<div id="output" style="margin-top:20px;text-align:left;"></div>

</div>
<script src="script.jsx"></script>
</body>
</html>
