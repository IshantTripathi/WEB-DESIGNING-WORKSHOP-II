<!DOCTYPE html>
<html>
<head>
<title>Hill Climb Racing</title>
<style>

body{
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  color: rgb(9, 5, 83);
  padding: 0;
  background-image: url("https://th.bing.com/th/id/R.13274bad300a268e6ffadfc709f12a63?rik=l8FBIfXvdRW%2bRA&riu=http%3a%2f%2fitechify.com%2fwp-content%2fuploads%2f2015%2f10%2fDownload-Hill-Climb-Racing-for-PC-Windows-10-and-Prior1.jpg&ehk=j42rncskop4QK137E%2bXMfOX4gwizfIYSZRL%2f5YZamuI%3d&risl=&pid=ImgRaw&r=0"); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  height: 100vh;  
}
.menu-btn{
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 28px;
  cursor: pointer;
  z-index: 10;
  color: cyan;
}
.main{
  text-align: center;
  padding-top: 100px;
}
.container{
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-top: 40px;
}
.card{
  width: 260px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px cyan;
  transition: 0.4s;
}
.card:hover{
  transform: scale(1.05);

}
.card img{
  width: 100%;
  border-radius: 10px;
}
.button{
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: transparent;
  border: 2px solid cyan;
  color: cyan;
  text-decoration: none;
  border-radius: 5px;
  transition: 0.3s;
}
.button:hover{
  background: cyan;
  color: black;
 
}
.start-btn{
  display: inline-block;
  margin-top: 50px;
  padding: 15px 35px;
  border-radius: 30px;
  background: lime;
  color: black;
  font-size: 20px;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 0 20px rgb(0, 0, 255);
}
.start-btn:hover{
  background: black;
  color: lime;
 
}

</style>
</head>
<body>

<div class="overlay"></div>

<div class="navbar" id="sidebar">
  <a href="">Home</a>
  <a href="">Vehicles</a>
  <a href="">Garage</a>
  <a href="">Settings</a>
</div>
<div class="main">
  <div class="container">
    <div class="card">
      <img src="https://tse4.mm.bing.net/th/id/OIP.2WLNmSjnqWBpZmtvBAgf0wHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
      <h3>Car</h3>
      <p>Coins: 8,00,000</p>
      <a href="#" class="button">View Details</a>
    </div>
    <div class="card">
      <img src="https://tse2.mm.bing.net/th/id/OIP.TvjZEV02IPZqxsRq5KxjsQAAAA?rs=1&pid=ImgDetMain&o=7&rm=3">
      <h3>Bike</h3>
      <p>Coins: 1,20,000</p>
      <a href="" class="button">View Details</a>
    </div>
  </div>
    <a href="" class="start-btn">Start Game</a>
    
</div>
<audio src="hill climb bgm.mp3" autoplay loop></audio>
</body>
</html>
